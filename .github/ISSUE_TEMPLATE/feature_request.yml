name: Improvement Idea
description: Suggest an improvement or new feature (not a new Azure resource — use "New Azure Resource Request" for that)
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem or gap does this address?
      description: Describe the current limitation or missing capability.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - AI agent context / AGENTS.md
        - Naming or tagging conventions
        - CI/CD pipeline
        - Pre-commit hooks
        - Provider or Terraform version
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you thought about?

  - type: textarea
    id: notes
    attributes:
      label: Additional Context
