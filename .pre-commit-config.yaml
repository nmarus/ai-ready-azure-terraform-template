repos:
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.2
    hooks:
      # Terraform fmt - format all Terraform files
      - id: terraform_fmt
        name: Terraform fmt
        description: Format Terraform files with terraform fmt

      # Terraform docs - generate documentation
      - id: terraform_docs
        name: Terraform docs
        description: Generate Terraform documentation
        args:
          - --hook-config=--path-to-file=README.md
          - --hook-config=--add-to-existing-file=true
          - --hook-config=--create-file-if-not-exist=true

      # Terraform validate - validate configuration
      - id: terraform_validate
        name: Terraform validate
        description: Validate Terraform configuration files

      # TFLint - Terraform linter
      - id: terraform_tflint
        name: Terraform TFLint
        description: Lint Terraform files with TFLint
        args:
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl

      # Checkov - security and compliance scanning
      - id: terraform_checkov
        name: Terraform Checkov
        description: Run Checkov security scanner on Terraform files
        args:
          - --args=--quiet
          - --args=--framework=terraform

  # Additional general hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of files
      - id: check-yaml
        name: Check YAML syntax
        exclude: ^\.github/workflows/
      - id: check-added-large-files
        name: Check for large files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: detect-private-key
        name: Detect private keys
